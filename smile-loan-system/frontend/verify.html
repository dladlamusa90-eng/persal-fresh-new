<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Smile Loan - Verify Identity</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body data-page="verify">
    <main class="shell">
      <section class="card">
        <div class="card-header">
          <p class="eyebrow">Identity Verification</p>
          <h1>Capture a Live Selfie</h1>
          <p class="muted">Position your face clearly in the frame before capturing.</p>
        </div>

        <div class="camera-frame" id="camera-frame" aria-live="polite">
          <video id="camera-preview" autoplay playsinline muted></video>
          <p class="camera-placeholder">Camera preview will appear here.</p>
        </div>

        <canvas id="capture-canvas" hidden></canvas>

        <div class="actions">
          <a class="btn btn-ghost" href="./apply.html">Back</a>
          <button class="btn btn-primary" id="capture-selfie" type="button">Capture Selfie</button>
        </div>
      </section>
    </main>
    <script src="./app.js" defer></script>
  </body>
</html>
